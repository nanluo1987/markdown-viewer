<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MD Viewer">
<meta name="theme-color" content="#FAF8F5">
<title>MD Viewer</title>

<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="data:application/json,{%22name%22:%22MD%20Viewer%22,%22short_name%22:%22MD%20Viewer%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23FAF8F5%22,%22theme_color%22:%22%23FAF8F5%22,%22icons%22:[{%22src%22:%22icon-192.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},{%22src%22:%22icon-512.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,300;1,8..60,400;1,8..60,500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #FAF8F5;
    --bg-bar: #F0EDE8;
    --bg-hover: #E8E4DE;
    --bg-active: #DDD8D0;
    --border: #DDD8D0;
    --text-1: #2D2B28;
    --text-2: #6B665E;
    --text-3: #9A9389;
    --accent: #C5694A;
    --accent-light: #F4E8E3;
    --accent-hover: #B35A3D;
    --serif: 'Source Serif 4', 'PingFang SC', 'Microsoft YaHei', Georgia, serif;
    --sans: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    --mono: 'SF Mono', 'Menlo', monospace;
    --size: 17px;
    --lh: 1.78;
    --ease: cubic-bezier(.4,0,.2,1);
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text-1); font-family: var(--sans); }

  .app { display: flex; flex-direction: column; height: 100%; }

  /* ── Top Bar ── */
  .topbar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px;
    padding-top: calc(8px + var(--sat));
    padding-left: calc(12px + var(--sal));
    padding-right: calc(12px + var(--sar));
    background: var(--bg-bar); border-bottom: 1px solid var(--border);
    flex-shrink: 0; min-height: calc(52px + var(--sat));
    z-index: 10;
  }
  .topbar-title {
    flex: 1; font-size: 15px; font-weight: 600; color: var(--text-1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-align: center; padding: 0 4px;
  }
  .icon-btn {
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    background: none; border: none; border-radius: 10px; color: var(--text-2);
    cursor: pointer; flex-shrink: 0; transition: background .15s var(--ease), color .15s var(--ease);
  }
  .icon-btn:active { background: var(--bg-active); color: var(--text-1); }
  .icon-btn.accent { color: var(--accent); }
  .font-label {
    font-size: 12px; color: var(--text-3); min-width: 28px; text-align: center;
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }
  .divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
  #file-input { display: none; }

  /* ── Views Container ── */
  .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .view.active { display: flex; }

  /* ── Reading View ── */
  .content {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 28px 20px;
    padding-bottom: calc(28px + var(--sab));
    padding-left: calc(20px + var(--sal));
    padding-right: calc(20px + var(--sar));
  }
  .content-inner { max-width: 680px; margin: 0 auto; }

  /* ── Welcome ── */
  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding-top: 30vh; color: var(--text-3);
  }
  .welcome svg { margin-bottom: 20px; opacity: 0.25; }
  .welcome h2 { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--text-2); margin-bottom: 8px; }
  .welcome p { font-size: 14px; line-height: 1.6; }
  .welcome-btn {
    margin-top: 24px; padding: 12px 28px; background: var(--accent); color: #fff;
    border: none; border-radius: 12px; font-family: var(--sans); font-size: 15px; font-weight: 500; cursor: pointer;
  }
  .welcome-btn:active { background: var(--accent-hover); }

  /* ── File List View ── */
  .filelist-view {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 16px;
    padding-bottom: calc(16px + var(--sab));
    padding-left: calc(16px + var(--sal));
    padding-right: calc(16px + var(--sar));
  }

  .import-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px; margin-bottom: 20px;
    background: var(--accent); color: #fff; border: none; border-radius: 12px;
    font-family: var(--sans); font-size: 15px; font-weight: 500; cursor: pointer;
  }
  .import-btn:active { background: var(--accent-hover); }

  .file-entry {
    display: flex; align-items: center; gap: 12px;
    padding: 14px; margin-bottom: 8px;
    background: var(--bg-bar); border-radius: 12px;
    cursor: pointer; transition: background .12s;
  }
  .file-entry:active { background: var(--bg-hover); }

  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-size: 14.5px; font-weight: 500; color: var(--text-1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 6px;
  }
  .file-progress-row { display: flex; align-items: center; gap: 8px; }
  .file-progress-bar {
    flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .file-progress-fill {
    height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s var(--ease);
  }
  .file-progress-text {
    font-size: 11.5px; color: var(--text-3); min-width: 32px; text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .file-delete {
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    background: none; border: none; border-radius: 8px; color: var(--text-3);
    cursor: pointer; flex-shrink: 0; transition: color .12s, background .12s;
  }
  .file-delete:active { background: var(--accent-light); color: var(--accent); }

  .filelist-empty {
    text-align: center; color: var(--text-3); font-size: 14px; line-height: 1.6; padding: 40px 0;
  }

  /* ── Outline Drawer ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.35);
    opacity: 0; pointer-events: none; transition: opacity .28s var(--ease); z-index: 90;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: min(300px, 80vw); background: var(--bg-bar);
    transform: translateX(-100%); transition: transform .28s var(--ease);
    z-index: 100; display: flex; flex-direction: column;
    padding-top: var(--sat); padding-left: var(--sal);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .drawer-header h3 { font-family: var(--serif); font-size: 17px; font-weight: 600; color: var(--text-1); }

  .drawer-body {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 8px 10px; padding-bottom: calc(8px + var(--sab));
  }

  .outline-item {
    display: block; padding: 12px 14px; border-radius: 8px;
    font-family: var(--serif); font-size: 15px; line-height: 1.45;
    color: var(--text-2); cursor: pointer; transition: background .12s;
  }
  .outline-item:active { background: var(--bg-hover); }
  .outline-empty {
    padding: 32px 16px; text-align: center; color: var(--text-3); font-size: 14px; line-height: 1.6;
  }

  /* ── Markdown Body ── */
  .md { font-family: var(--serif); font-size: var(--size); line-height: var(--lh); color: var(--text-1); }
  .md h1,.md h2,.md h3,.md h4,.md h5,.md h6 {
    font-family: var(--serif); font-weight: 600; color: var(--text-1);
    margin-top: 1.6em; margin-bottom: 0.5em; line-height: 1.3;
  }
  .md h1:first-child,.md h2:first-child,.md h3:first-child { margin-top: 0; }
  .md h1 { font-size: 1.7em; font-weight: 700; padding-bottom: 0.25em; border-bottom: 1px solid var(--border); }
  .md h2 { font-size: 1.4em; } .md h3 { font-size: 1.15em; }
  .md p { margin-bottom: 0.9em; } .md p:last-child { margin-bottom: 0; }
  .md a { color: var(--accent); text-decoration: none; }
  .md strong { font-weight: 600; } .md em { font-style: italic; }
  .md blockquote { border-left: 3px solid var(--accent); padding: 2px 0 2px 16px; margin: 1em 0; color: var(--text-2); }
  .md ul,.md ol { padding-left: 1.6em; margin-bottom: 0.9em; }
  .md li { margin-bottom: 0.3em; } .md li>ul,.md li>ol { margin-bottom: 0; margin-top: 0.3em; }
  .md code { font-family: var(--mono); font-size: 0.86em; background: var(--bg-bar); padding: 2px 5px; border-radius: 4px; color: var(--accent-hover); }
  .md pre { background: #2D2B28; color: #E8E4DE; padding: 14px 16px; border-radius: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 1em 0; line-height: 1.5; }
  .md pre code { background: none; padding: 0; color: inherit; font-size: 0.84em; }
  .md table { width: 100%; border-collapse: collapse; margin: 1em 0; font-family: var(--sans); font-size: 0.88em; }
  .md th,.md td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .md th { font-weight: 600; color: var(--text-2); font-size: 0.82em; text-transform: uppercase; letter-spacing: 0.04em; }
  .md img { max-width: 100%; border-radius: 8px; margin: 0.8em 0; }
  .md hr { border: none; height: 1px; background: var(--border); margin: 1.8em 0; }
  .md input[type="checkbox"] { margin-right: 5px; accent-color: var(--accent); }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <div class="topbar">
    <!-- Outline button (reading view) -->
    <button class="icon-btn" id="btn-outline" onclick="toggleOutline()" aria-label="Outline" style="display:none">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
    </button>
    <!-- Back button (file list view) -->
    <button class="icon-btn" id="btn-back" onclick="showReading()" aria-label="Back" style="display:none">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <span class="topbar-title" id="title">MD Viewer</span>

    <!-- Font controls (reading view) -->
    <span id="font-controls" style="display:none">
      <button class="icon-btn" onclick="changeFontSize(-1)" aria-label="Smaller">
        <svg width="20" height="20" viewBox="0 0 24 24"><text x="4" y="18" font-size="16" font-family="Georgia" fill="currentColor">A</text><line x1="17" y1="13" x2="23" y2="13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
      <span class="font-label" id="font-label">17</span>
      <button class="icon-btn" onclick="changeFontSize(1)" aria-label="Larger">
        <svg width="20" height="20" viewBox="0 0 24 24"><text x="2" y="18" font-size="18" font-family="Georgia" fill="currentColor">A</text><line x1="17" y1="13" x2="23" y2="13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><line x1="20" y1="10" x2="20" y2="16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
      <div class="divider"></div>
    </span>

    <!-- File list button -->
    <button class="icon-btn accent" id="btn-files" onclick="showFileList()" aria-label="Files">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </button>
  </div>

  <!-- ═══ Reading View ═══ -->
  <div class="view active" id="view-reading">
    <div class="content" id="content-scroll">
      <div class="content-inner" id="content">
        <div class="welcome" id="welcome">
          <svg width="56" height="56" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="8" y="4" width="48" height="56" rx="4"/>
            <line x1="18" y1="18" x2="46" y2="18"/><line x1="18" y1="26" x2="42" y2="26"/>
            <line x1="18" y1="34" x2="38" y2="34"/><line x1="18" y1="42" x2="44" y2="42"/>
          </svg>
          <h2>Markdown Viewer</h2>
          <p>Import a .md file to start reading</p>
          <button class="welcome-btn" onclick="showFileList()">Import File</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ File List View ═══ -->
  <div class="view" id="view-filelist">
    <div class="filelist-view">
      <button class="import-btn" onclick="document.getElementById('file-input').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Import File
      </button>
      <div id="file-list-entries"></div>
    </div>
  </div>

  <input type="file" id="file-input" accept=".md,.markdown,.txt" onchange="importFile(this)" multiple>
</div>

<!-- Outline Drawer -->
<div class="overlay" id="overlay" onclick="toggleOutline()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <h3>Outline</h3>
    <button class="icon-btn" onclick="toggleOutline()" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="outline-list">
    <div class="outline-empty">Open a file to see<br>its outline</div>
  </div>
</aside>

<script>
  // ══════════════════════════════════════════════════
  //  Storage & State
  // ══════════════════════════════════════════════════
  const SK_FILES = 'mdv_files';       // { [id]: { name, content, scrollPct } }
  const SK_FONT  = 'mdv_fontSize';    // number
  const SK_ACTIVE = 'mdv_activeFile'; // string id

  let filesDB = {}, activeId = null, outlineOpen = false;
  let currentSize = 17, currentView = 'reading', scrollTimer = null;

  function save(k, v) { try { localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v)); } catch(e){} }
  function load(k) { try { return localStorage.getItem(k); } catch(e){ return null; } }

  function loadState() {
    try { const r = load(SK_FILES); if (r) filesDB = JSON.parse(r); } catch(e){ filesDB = {}; }
    const fs = load(SK_FONT); if (fs) currentSize = Math.min(26, Math.max(13, parseInt(fs)));
    activeId = load(SK_ACTIVE) || null;
  }

  function saveFiles()  { save(SK_FILES, filesDB); }
  function saveFont()   { save(SK_FONT, String(currentSize)); }
  function saveActive() { save(SK_ACTIVE, activeId || ''); }

  function makeId(name) { return name.replace(/[^a-zA-Z0-9_.\-]/g, '_') + '_' + Date.now().toString(36); }

  // ══════════════════════════════════════════════════
  //  Bold fix preprocessing
  // ══════════════════════════════════════════════════
  const isPunct = (ch) => /\p{P}/u.test(ch);

  function preprocessMarkdown(text) {
    const lines = text.split('\n'); let inFence = false;
    return lines.map(line => {
      if (/^`{3,}/.test(line.trimStart())) { inFence = !inFence; return line; }
      if (inFence) return line;
      return fixBoldInLine(restoreEscapedStars(line));
    }).join('\n');
  }

  function restoreEscapedStars(line) {
    let out = '', inC = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i]==='`') { inC = !inC; out += '`'; continue; }
      if (!inC && line[i]==='\\' && line[i+1]==='*' && line[i+2]==='\\' && line[i+3]==='*') { out += '**'; i += 3; continue; }
      out += line[i];
    }
    return out;
  }

  function fixBoldInLine(line) {
    let r = '', i = 0;
    while (i < line.length) {
      if (line[i]==='`') { let e = line.indexOf('`',i+1); if (e===-1){r+=line.substring(i);break;} r+=line.substring(i,e+1); i=e+1; continue; }
      if (line[i]==='*' && line[i+1]==='*' && !(i+2<line.length&&line[i+2]==='*') && !(i>0&&line[i-1]==='*')) {
        let c = findCB(line,i+2);
        if (c!==-1) {
          let ca=line[i+2]||'', cb=line[c-1]||'';
          if (isPunct(ca)||isPunct(cb)) { r+='<strong>'+line.substring(i+2,c)+'</strong>'; i=c+2; continue; }
          r+=line.substring(i,c+2); i=c+2; continue;
        }
        r+='**'; i+=2; continue;
      }
      r+=line[i]; i++;
    }
    return r;
  }

  function findCB(line,s) {
    for (let j=s;j<line.length-1;j++) {
      if (line[j]==='`'){let e=line.indexOf('`',j+1);if(e===-1)return -1;j=e;continue;}
      if (line[j]==='*'&&line[j+1]==='*'&&!(j+2<line.length&&line[j+2]==='*')&&!(j>0&&line[j-1]==='*')) return j;
    }
    return -1;
  }

  // ══════════════════════════════════════════════════
  //  Import
  // ══════════════════════════════════════════════════
  async function importFile(input) {
    const files = Array.from(input.files); if (!files.length) return;
    let lastId = null;
    for (const f of files) {
      const id = makeId(f.name);
      filesDB[id] = { name: f.name, content: await f.text(), scrollPct: 0 };
      lastId = id;
    }
    saveFiles(); input.value = '';
    if (lastId) openFile(lastId);
  }

  // ══════════════════════════════════════════════════
  //  Open / Render
  // ══════════════════════════════════════════════════
  function openFile(id, options = {}) {
    const entry = filesDB[id]; 
    if (!entry) return;
  
    const { restoreOnly = false } = options;
  
    if (!restoreOnly && activeId && activeId !== id) {
      saveCurrentScroll();
    }
  
    activeId = id; 
    saveActive();
  
    document.getElementById('title').textContent = entry.name;
  
    const html = marked.parse(preprocessMarkdown(entry.content), { breaks: true, gfm: true });
    document.getElementById('content').innerHTML = `<div class="md">${html}</div>`;
  
    buildOutline(); 
    showReading();
  
    requestAnimationFrame(() => {
      const el = document.getElementById('content-scroll');
      const max = el.scrollHeight - el.clientHeight;
      el.scrollTop = Math.round((entry.scrollPct || 0) * max);
    });
  }

  // ══════════════════════════════════════════════════
  //  Delete
  // ══════════════════════════════════════════════════
  function deleteFile(id, evt) {
    evt.stopPropagation();
    if (!confirm('Delete "' + (filesDB[id]?.name||'') + '"?')) return;
    delete filesDB[id]; saveFiles();
    if (activeId === id) {
      activeId = null; saveActive();
      document.getElementById('title').textContent = 'MD Viewer';
      document.getElementById('content').innerHTML = '';
    }
    renderFileList();
  }

  // ══════════════════════════════════════════════════
  //  Scroll position
  // ══════════════════════════════════════════════════
  function saveCurrentScroll() {
    if (!activeId || !filesDB[activeId]) return;
    const el = document.getElementById('content-scroll');
    const max = el.scrollHeight - el.clientHeight;
    filesDB[activeId].scrollPct = max > 0 ? el.scrollTop / max : 0;
    saveFiles();
  }

  document.getElementById('content-scroll').addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(saveCurrentScroll, 400);
  }, { passive: true });
  
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      saveCurrentScroll();
    }
  });
  
  window.addEventListener('pagehide', saveCurrentScroll);
  window.addEventListener('beforeunload', saveCurrentScroll);

  // ══════════════════════════════════════════════════
  //  View switching
  // ══════════════════════════════════════════════════
  function showReading() {
    currentView = 'reading';
    document.getElementById('view-reading').classList.add('active');
    document.getElementById('view-filelist').classList.remove('active');
    document.getElementById('btn-outline').style.display = activeId ? '' : 'none';
    document.getElementById('btn-back').style.display = 'none';
    document.getElementById('font-controls').style.display = activeId ? 'contents' : 'none';
    document.getElementById('btn-files').style.display = '';
    document.getElementById('title').textContent = activeId ? (filesDB[activeId]?.name || 'MD Viewer') : 'MD Viewer';
  }

  function showFileList() {
    saveCurrentScroll(); currentView = 'filelist';
    document.getElementById('view-reading').classList.remove('active');
    document.getElementById('view-filelist').classList.add('active');
    document.getElementById('btn-outline').style.display = 'none';
    document.getElementById('btn-back').style.display = activeId ? '' : 'none';
    document.getElementById('font-controls').style.display = 'none';
    document.getElementById('btn-files').style.display = 'none';
    document.getElementById('title').textContent = 'Files';
    renderFileList();
  }

  function showWelcome() {
    document.getElementById('content').innerHTML = `
      <div class="welcome">
        <svg width="56" height="56" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="8" y="4" width="48" height="56" rx="4"/>
          <line x1="18" y1="18" x2="46" y2="18"/><line x1="18" y1="26" x2="42" y2="26"/>
          <line x1="18" y1="34" x2="38" y2="34"/><line x1="18" y1="42" x2="44" y2="42"/>
        </svg>
        <h2>Markdown Viewer</h2>
        <p>Import a .md file to start reading</p>
        <button class="welcome-btn" onclick="showFileList()">Import File</button>
      </div>`;
  }

  // ══════════════════════════════════════════════════
  //  Render file list
  // ══════════════════════════════════════════════════
  function renderFileList() {
    const box = document.getElementById('file-list-entries');
    const ids = Object.keys(filesDB);
    if (!ids.length) { box.innerHTML = '<div class="filelist-empty">No files imported yet</div>'; return; }

    box.innerHTML = ids.map(id => {
      const f = filesDB[id], pct = Math.round((f.scrollPct||0)*100);
      return `<div class="file-entry" onclick="openFile('${id}')">
        <div class="file-info">
          <div class="file-name">${esc(f.name)}</div>
          <div class="file-progress-row">
            <div class="file-progress-bar"><div class="file-progress-fill" style="width:${pct}%"></div></div>
            <div class="file-progress-text">${pct}%</div>
          </div>
        </div>
        <button class="file-delete" onclick="deleteFile('${id}',event)" aria-label="Delete">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
        </button>
      </div>`;
    }).join('');
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ══════════════════════════════════════════════════
  //  Outline
  // ══════════════════════════════════════════════════
  function buildOutline() {
    const hh = document.querySelectorAll('.md h1');
    const list = document.getElementById('outline-list');
    if (!hh.length) { list.innerHTML = '<div class="outline-empty">No H1 headings<br>in this file</div>'; return; }
    list.innerHTML = Array.from(hh).map((h,i) => {
      h.id = 'h1-'+i;
      return `<div class="outline-item" onclick="goTo('h1-${i}')">${h.textContent.replace(/'/g,'&#39;')}</div>`;
    }).join('');
  }

  function goTo(id) { toggleOutline(); setTimeout(()=>{ const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },120); }

  function toggleOutline() {
    outlineOpen = !outlineOpen;
    document.getElementById('drawer').classList.toggle('open', outlineOpen);
    document.getElementById('overlay').classList.toggle('open', outlineOpen);
  }

  // ══════════════════════════════════════════════════
  //  Font size (persisted)
  // ══════════════════════════════════════════════════
  function changeFontSize(d) {
    currentSize = Math.min(26, Math.max(13, currentSize + d));
    document.documentElement.style.setProperty('--size', currentSize + 'px');
    document.getElementById('font-label').textContent = currentSize;
    saveFont();
  }

  // ══════════════════════════════════════════════════
  //  Swipe gestures
  // ══════════════════════════════════════════════════
  {
    let sx=0, sy=0, tr=false;
    document.addEventListener('touchstart', e => {
      const t = e.touches[0];
      if (t.clientX<=28 && !outlineOpen && currentView==='reading') { sx=t.clientX; sy=t.clientY; tr=true; }
      if (outlineOpen && !e.target.closest('.drawer')) { sx=t.clientX; sy=t.clientY; tr=true; }
    }, {passive:true});
    document.addEventListener('touchmove', e => {
      if (!e.target.closest('.content,.drawer-body,.filelist-view')) e.preventDefault();
    }, {passive:false});
    document.addEventListener('touchend', e => {
      if (!tr) return; tr=false;
      const t=e.changedTouches[0], dx=t.clientX-sx, dy=Math.abs(t.clientY-sy);
      if (dy>Math.abs(dx)*1.2) return;
      if (!outlineOpen && dx>60) toggleOutline();
      else if (outlineOpen && dx<-60) toggleOutline();
    }, {passive:true});
  }

  // ══════════════════════════════════════════════════
  //  Init
  // ══════════════════════════════════════════════════
  marked.setOptions({ headerIds: false, mangle: false });
  loadState();
  document.documentElement.style.setProperty('--size', currentSize + 'px');
  document.getElementById('font-label').textContent = currentSize;
  
  if (activeId && filesDB[activeId]) {
    openFile(activeId, { restoreOnly: true });
  } else {
    showWelcome();
    showReading();
  }
</script>

</body>
</html>
